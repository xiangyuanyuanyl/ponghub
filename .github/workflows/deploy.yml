name: Deploy to GitHub Pages

on:
  schedule:
    - cron: '*/30 * * * *'   # 每30分钟运行一次
  workflow_dispatch:          # 允许手动触发

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.5'

      - name: Create data directory
        run: mkdir -p data

      - name: Build
        run: go build -o bin/ponghub ./cmd/ponghub

      - name: Run ponghub to generate report
        run: ./bin/ponghub

      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './data'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
